name: Clojure Dependencies

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure (CLI + Leiningen)
        uses: DeLaGuardo/setup-clojure@f556541eb28a9303896cee0679ba9f60b898300f # 13.5
        with:
          cli: latest
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Check for outdated dependencies and upgrade project.clj
        run: clojure -Sdeps '{:deps {com.github.liquidz/antq {:mvn/version "RELEASE"}}}' -M -m antq.core --upgrade --force --skip=github-action

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- project.clj; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upgraded project compiles
        if: steps.diff.outputs.changed == 'true'
        run: lein check

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          add-paths: project.clj
          commit-message: 'Bump Clojure dependencies via antq'
          title: 'Bump Clojure dependencies'
          body: |
            Automated dependency update for `project.clj`, generated by [antq](https://github.com/liquidz/antq).

            Dependabot has no native Leiningen/Clojure support, so this workflow fills that gap on a weekly schedule.
          branch: deps/clojure-antq
          delete-branch: true
