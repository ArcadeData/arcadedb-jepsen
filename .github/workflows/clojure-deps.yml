name: Clojure Dependencies

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Clojure (CLI + Leiningen)
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          lein: latest

      - name: Cache Maven dependencies
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Check for outdated dependencies and upgrade project.clj
        run: clojure -Sdeps '{:deps {com.github.liquidz/antq {:mvn/version "RELEASE"}}}' -M -m antq.core --upgrade --force

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- project.clj; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify upgraded project compiles
        if: steps.diff.outputs.changed == 'true'
        run: lein check

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'Bump Clojure dependencies via antq'
          title: 'Bump Clojure dependencies'
          body: |
            Automated dependency update for `project.clj`, generated by [antq](https://github.com/liquidz/antq).

            Dependabot has no native Leiningen/Clojure support, so this workflow fills that gap on a weekly schedule.
          branch: deps/clojure-antq
          delete-branch: true
